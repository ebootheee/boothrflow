# https://nexte.st/docs/configuration/

[profile.default]
# Run each test in its own process. FFI globals (whisper, llama, cpal) make
# this critical — a panic in one test must not poison the rest.
test-threads = "num-cpus"
slow-timeout = { period = "30s", terminate-after = 3 }
status-level = "fail"
final-status-level = "flaky"

[profile.default.junit]
path = "junit.xml"
report-name = "boothrflow"

# Retry once on the first failure. Tests that pass on retry are reported as
# flaky (not failed). Useful for the inevitable sporadic FFI/audio test.
[[profile.default.overrides]]
filter = 'test(/^win32_/) | test(/^audio_/) | test(/_e2e$/)'
retries = { backoff = "exponential", count = 2, delay = "200ms", jitter = true }

# Faster CI tier: no retries, fail-fast off so we see all failures.
[profile.ci]
fail-fast = false
status-level = "all"
final-status-level = "flaky"
slow-timeout = { period = "60s", terminate-after = 2 }
