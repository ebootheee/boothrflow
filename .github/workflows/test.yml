name: test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust unit + integration (test-fakes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            libgtk-layer-shell-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: nextest
        working-directory: src-tauri
        run: cargo nextest run --no-default-features --features test-fakes --profile ci

      - name: doctests
        working-directory: src-tauri
        run: cargo test --doc --no-default-features --features test-fakes

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-rust
          path: src-tauri/target/nextest/ci/junit.xml

  frontend:
    name: frontend vitest (unit + browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (for vitest browser mode)
        run: pnpm exec playwright install --with-deps chromium

      - name: Vitest (all projects)
        run: pnpm test:fe
