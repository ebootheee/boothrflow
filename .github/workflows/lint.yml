name: lint

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (eslint + prettier + svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm check:lint

      - name: Prettier
        run: pnpm check:format

      - name: svelte-check
        run: pnpm check:types

  rust:
    name: rust (rustfmt + clippy, test-fakes feature only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            libgtk-layer-shell-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: clippy (test-fakes)
        working-directory: src-tauri
        run: cargo clippy --no-default-features --features test-fakes --all-targets -- -D warnings
